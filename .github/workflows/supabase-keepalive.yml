name: Supabase Keep-Alive

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ihobumwetoidqioifknt.supabase.co/rest/v1/strains?select=id&limit=1" \
            -H "apikey: sb_publishable_ONFzRadujAFsi2mVGTmCvA_pK61sODL" \
            -H "Authorization: Bearer sb_publishable_ONFzRadujAFsi2mVGTmCvA_pK61sODL")
          echo "Supabase ping status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
