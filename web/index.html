<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChlamAtlas</title>

  <!-- Tailwind CSS via CDN (replace with build pipeline if needed) -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <!-- Supabase UMD bundle — loaded as plain script to avoid ESM CDN issues in Safari -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.101.1/dist/umd/supabase.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand':  '#1a6b4a',
            'nav':    '#0f4530',
            'ctd':    '#4b2e83',
            'ctl2':   '#16a34a',
            'cm':     '#2563eb',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans:    ['"DM Sans"', 'system-ui', 'sans-serif'],
            mono:    ['"DM Mono"', 'monospace'],
          },
        }
      }
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/web/css/app.css?v=48" />
</head>
<body class="bg-white text-gray-900 font-sans min-h-screen">

  <!-- ─── TOP NAV ─────────────────────────────────────────── -->
  <header class="sticky top-0 z-50 shadow-md" style="background:#0f4530;">
    <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-14 gap-4">

      <!-- Logo / wordmark -->
      <a href="#" id="nav-home-logo" class="flex items-center gap-2 flex-shrink-0">
        <img src="/design/chlamatlas_icon.png" alt="ChlamAtlas" class="h-7 w-7 rounded" onerror="this.style.display='none'" />
        <span class="font-display font-bold text-xl text-white tracking-tight leading-none">ChlamAtlas</span>
      </a>

      <!-- Primary tabs (desktop) -->
      <nav class="hidden sm:flex items-center gap-0.5 flex-1 justify-center" id="primary-nav">
        <button data-tab="home"     class="nav-tab active">Home</button>
        <button data-tab="genomes"  class="nav-tab">Genomes</button>
        <button data-tab="mutants"  class="nav-tab">Mutants</button>
        <button data-tab="pipeline" class="nav-tab" style="display:none">Pipeline</button>
      </nav>

      <!-- Right side: auth -->
      <div id="auth-area" class="flex items-center gap-2 flex-shrink-0">
        <button id="btn-sign-in"
          class="text-sm text-white/80 hover:text-white font-medium px-3 py-1.5 rounded-lg hover:bg-white/10 transition border border-white/30 hover:border-white/50">
          Sign in
        </button>
      </div>

    </div>
  </header>

  <!-- ─── MAIN CONTENT ─────────────────────────────────────── -->
  <main class="pb-24 sm:pb-8">

    <!-- HOME TAB -->
    <section id="tab-home" class="tab-panel">
      <div id="home-content"></div>
    </section>

    <!-- GENOMES TAB -->
    <section id="tab-genomes" class="tab-panel hidden">
      <div id="genomes-content"></div>
    </section>

    <!-- MUTANTS TAB -->
    <section id="tab-mutants" class="tab-panel hidden">
      <div id="mutants-content" class="max-w-5xl mx-auto px-4"></div>
    </section>

    <!-- PIPELINE TAB -->
    <section id="tab-pipeline" class="tab-panel hidden">
      <div id="pipeline-content" class="max-w-5xl mx-auto px-4"></div>
    </section>

  </main>

  <!-- ─── MOBILE BOTTOM NAV ─────────────────────────────────── -->
  <nav class="sm:hidden fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-100 flex safe-area-pb" id="mobile-nav">
    <button data-tab="home" class="mobile-tab active flex-1">
      <span class="tab-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </span>
      <span class="text-[10px] font-medium mt-0.5">Home</span>
    </button>
    <button data-tab="genomes" class="mobile-tab flex-1">
      <span class="tab-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16.1A5 5 0 0 1 5.5 8h.5a6 6 0 0 1 6-6 6 6 0 0 1 6 6h.5a5 5 0 0 1 3.5 8.4"/><path d="m12 12 4 10"/><path d="m12 12-4 10"/><path d="M12 2v10"/></svg>
      </span>
      <span class="text-[10px] font-medium mt-0.5">Genomes</span>
    </button>
    <button data-tab="mutants" class="mobile-tab flex-1">
      <span class="tab-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5a2 2 0 0 0-2 2v4"/><path d="M9 3h6"/><path d="M15 3h4a2 2 0 0 1 2 2v4"/><path d="M3 9v6"/><path d="M21 9v6"/><path d="M3 15v4a2 2 0 0 0 2 2h4"/><path d="M15 21h4a2 2 0 0 0 2-2v-4"/><path d="M9 21h6"/><circle cx="12" cy="12" r="3"/></svg>
      </span>
      <span class="text-[10px] font-medium mt-0.5">Mutants</span>
    </button>
    <button data-tab="pipeline" class="mobile-tab flex-1" style="display:none">
      <span class="tab-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="6" height="4" rx="1"/><rect x="9" y="3" width="6" height="4" rx="1"/><rect x="16" y="3" width="6" height="4" rx="1"/><path d="M5 7v4"/><path d="M12 7v4"/><path d="M5 11h14"/><path d="M19 11v3a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-3"/></svg>
      </span>
      <span class="text-[10px] font-medium mt-0.5">Pipeline</span>
    </button>
  </nav>

  <!-- ─── AUTH MODAL ────────────────────────────────────────── -->
  <div id="auth-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
      <div class="px-6 py-5" style="background:#0f4530;">
        <h2 class="font-display font-bold text-white text-2xl leading-tight">ChlamAtlas</h2>
        <p class="text-white/60 text-xs mt-0.5">Research data for <em>Chlamydia</em></p>
      </div>
      <div class="p-6">
        <!-- Tab bar -->
        <div class="flex mb-5 border-b border-gray-100">
          <button id="auth-tab-signin"
            class="text-sm font-semibold pb-2 mr-5 border-b-2 transition-colors"
            style="color:#0f4530;border-color:#0f4530;">Sign in</button>
          <button id="auth-tab-signup"
            class="text-sm font-medium pb-2 border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors">Create account</button>
        </div>

        <!-- Sign-in panel -->
        <div id="auth-panel-signin">
          <form id="auth-form-signin" class="flex flex-col gap-3">
            <input id="auth-email" type="email" placeholder="Email" required
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <input id="auth-password" type="password" placeholder="Password" required
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <p id="auth-error" class="text-red-500 text-xs hidden"></p>
            <button type="submit"
              class="w-full text-white rounded-lg py-2.5 text-sm font-semibold transition mt-1" style="background:#0f4530;">
              Sign in
            </button>
          </form>
        </div>

        <!-- Create account panel -->
        <div id="auth-panel-signup" class="hidden">
          <form id="auth-form-signup" class="flex flex-col gap-3">
            <input id="signup-email" type="email" placeholder="Email" required
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <input id="signup-password" type="password" placeholder="Password (min 8 characters)" required minlength="8"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <input id="signup-password2" type="password" placeholder="Confirm password" required
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <input id="signup-name" type="text" placeholder="Your name (optional)"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <input id="signup-affil" type="text" placeholder="Lab or institution (optional)"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <p id="signup-error" class="text-red-500 text-xs hidden"></p>
            <p id="signup-success" class="text-green-700 text-xs hidden"></p>
            <button type="submit"
              class="w-full text-white rounded-lg py-2.5 text-sm font-semibold transition mt-1" style="background:#0f4530;">
              Create account
            </button>
          </form>
        </div>

        <button id="auth-modal-close" class="mt-4 w-full text-center text-sm text-gray-400 hover:text-gray-600 transition-colors">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ─── ADMIN MODAL ───────────────────────────────────────── -->
  <div id="admin-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 overflow-hidden flex flex-col" style="max-height:85vh;">
      <div class="px-6 py-4 flex items-center justify-between flex-shrink-0" style="background:#0f4530;">
        <h2 class="font-display font-bold text-white text-xl">User Management</h2>
        <button id="admin-modal-close" class="text-white/60 hover:text-white text-xl leading-none transition-colors">✕</button>
      </div>
      <div id="admin-panel-content" class="flex-1 overflow-y-auto p-6">
        <div class="text-center text-gray-300 py-8">Loading…</div>
      </div>
    </div>
  </div>

  <!-- Supabase JS client (ESM via CDN) -->
  <script type="module" src="/web/js/app.js?v=48"></script>
</body>
</html>
