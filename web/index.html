<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChlamAtlas</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/web/images/favicon_32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/web/images/apple_touch_icon.png" />

  <!-- Tailwind CSS via CDN (replace with build pipeline if needed) -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <!-- Supabase UMD bundle — loaded as plain script to avoid ESM CDN issues in Safari -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.101.1/dist/umd/supabase.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand':  '#1a6b4a',
            'nav':    '#0f4530',
            'ctd':    '#4b2e83',
            'ctl2':   '#16a34a',
            'cm':     '#2563eb',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans:    ['"DM Sans"', 'system-ui', 'sans-serif'],
            mono:    ['"DM Mono"', 'monospace'],
          },
        }
      }
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/web/css/app.css?v=77" />
  <!-- Leaflet (community world map) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
</head>
<body class="bg-white text-gray-900 font-sans min-h-screen">

  <!-- ─── TOP NAV ─────────────────────────────────────────── -->
  <header class="sticky top-0 z-50 shadow-md" style="background:#0f4530;">
    <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-14 gap-4">

      <!-- Logo / wordmark -->
      <a href="#" id="nav-home-logo" class="flex items-center gap-2 flex-shrink-0">
        <img src="/web/images/chlamatlas_icon_64.png" alt="ChlamAtlas" class="h-7 w-7" onerror="this.style.display='none'" />
        <span class="font-display font-bold text-xl text-white tracking-tight leading-none">ChlamAtlas</span>
      </a>

      <!-- Primary tabs (desktop) -->
      <nav class="hidden sm:flex items-center gap-0.5 flex-1 justify-center" id="primary-nav">
        <button data-tab="home"     class="nav-tab active">Home</button>
        <button data-tab="genomes"  class="nav-tab">Genomes</button>
        <div class="relative" id="nav-mutants-wrap">
          <button id="nav-mutants-btn" data-tab="mutants" class="nav-tab">Mutants</button>
        </div>
        <button data-tab="pipeline" class="nav-tab" style="display:none">Pipeline</button>
      </nav>

      <!-- Right side: search, saved, auth -->
      <div class="flex items-center gap-2 flex-shrink-0">
        <div id="nav-search-area" style="position:relative;">
          <button id="btn-nav-search"
            class="hover:bg-white/10 transition rounded-md"
            style="display:flex;align-items:center;gap:5px;padding:5px 11px;cursor:pointer;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span style="font-size:12px;color:rgba(255,255,255,0.7);font-weight:500;">Search</span>
          </button>
          <div id="nav-search-expanded" class="nav-search-wrap" style="display:none;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="nav-search-input" class="nav-search-input" type="text" placeholder="Search genes, mutants…" autocomplete="off" />
          </div>
        </div>
        <button id="btn-nav-saved"
          class="hover:bg-white/10 transition rounded-md"
          style="display:flex;align-items:center;gap:5px;padding:5px 11px;cursor:pointer;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span style="font-size:12px;color:rgba(255,255,255,0.7);font-weight:500;">Saved</span>
        </button>
        <div id="auth-area" class="flex items-center gap-2">
          <button id="btn-sign-in"
            class="text-sm text-white/80 hover:text-white font-medium px-3 py-1.5 rounded-lg hover:bg-white/10 transition border border-white/30 hover:border-white/50">
            Sign in
          </button>
        </div>
      </div>

    </div>
  </header>

  <!-- ─── MAIN CONTENT ─────────────────────────────────────── -->
  <main class="pb-24 sm:pb-8">

    <!-- HOME TAB -->
    <section id="tab-home" class="tab-panel">
      <div id="home-content"></div>
    </section>

    <!-- GENOMES TAB -->
    <section id="tab-genomes" class="tab-panel hidden">
      <div id="genomes-content"></div>
    </section>

    <!-- MUTANTS TAB -->
    <section id="tab-mutants" class="tab-panel hidden">
      <div id="mutants-content" style="height:100%;overflow:hidden;"></div>
    </section>

    <!-- PIPELINE TAB -->
    <section id="tab-pipeline" class="tab-panel hidden">
      <div id="pipeline-content" class="max-w-5xl mx-auto px-4"></div>
    </section>

  </main>

  <!-- ─── MOBILE BOTTOM NAV ─────────────────────────────────── -->
  <nav class="sm:hidden fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-100 flex safe-area-pb" id="mobile-nav">
    <button data-tab="home" class="mobile-tab active flex-1">
      <span class="tab-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </span>
      <span class="text-[10px] font-medium mt-0.5">Home</span>
    </button>
    <button data-tab="genomes" class="mobile-tab flex-1">
      <span class="tab-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16.1A5 5 0 0 1 5.5 8h.5a6 6 0 0 1 6-6 6 6 0 0 1 6 6h.5a5 5 0 0 1 3.5 8.4"/><path d="m12 12 4 10"/><path d="m12 12-4 10"/><path d="M12 2v10"/></svg>
      </span>
      <span class="text-[10px] font-medium mt-0.5">Genomes</span>
    </button>
    <button data-tab="mutants" class="mobile-tab flex-1">
      <span class="tab-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5a2 2 0 0 0-2 2v4"/><path d="M9 3h6"/><path d="M15 3h4a2 2 0 0 1 2 2v4"/><path d="M3 9v6"/><path d="M21 9v6"/><path d="M3 15v4a2 2 0 0 0 2 2h4"/><path d="M15 21h4a2 2 0 0 0 2-2v-4"/><path d="M9 21h6"/><circle cx="12" cy="12" r="3"/></svg>
      </span>
      <span class="text-[10px] font-medium mt-0.5">Mutants</span>
    </button>
    <button data-tab="pipeline" class="mobile-tab flex-1" style="display:none">
      <span class="tab-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="6" height="4" rx="1"/><rect x="9" y="3" width="6" height="4" rx="1"/><rect x="16" y="3" width="6" height="4" rx="1"/><path d="M5 7v4"/><path d="M12 7v4"/><path d="M5 11h14"/><path d="M19 11v3a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-3"/></svg>
      </span>
      <span class="text-[10px] font-medium mt-0.5">Pipeline</span>
    </button>
  </nav>

  <!-- ─── AUTH MODAL ────────────────────────────────────────── -->
  <div id="auth-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
      <div class="px-6 py-5" style="background:#0f4530;">
        <h2 class="font-display font-bold text-white text-2xl leading-tight">ChlamAtlas</h2>
        <p class="text-white/60 text-xs mt-0.5">Research data for <em>Chlamydia</em></p>
      </div>
      <div class="p-6">
        <!-- Tab bar (hidden during forgot/reset flows) -->
        <div id="auth-tab-bar" class="flex mb-5 border-b border-gray-100">
          <button id="auth-tab-signin"
            class="text-sm font-semibold pb-2 mr-5 border-b-2 transition-colors"
            style="color:#0f4530;border-color:#0f4530;">Sign in</button>
          <button id="auth-tab-signup"
            class="text-sm font-medium pb-2 border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors">Create account</button>
        </div>

        <!-- Sign-in panel -->
        <div id="auth-panel-signin">
          <form id="auth-form-signin" class="flex flex-col gap-3">
            <input id="auth-email" type="email" placeholder="Email" required
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <div class="flex flex-col gap-1">
              <input id="auth-password" type="password" placeholder="Password" required
                class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
              <button type="button" id="auth-forgot-link"
                class="text-xs self-end transition-colors" style="color:#0f4530;">Forgot password?</button>
            </div>
            <p id="auth-error" class="text-red-500 text-xs hidden"></p>
            <button type="submit"
              class="w-full text-white rounded-lg py-2.5 text-sm font-semibold transition mt-1" style="background:#0f4530;">
              Sign in
            </button>
          </form>
        </div>

        <!-- Create account panel -->
        <div id="auth-panel-signup" class="hidden">
          <form id="auth-form-signup" class="flex flex-col gap-3">
            <input id="signup-email" type="email" placeholder="Email" required
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <input id="signup-password" type="password" placeholder="Password (min 8 characters)" required minlength="8"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <input id="signup-password2" type="password" placeholder="Confirm password" required
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <input id="signup-name" type="text" placeholder="Your name (optional)"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <input id="signup-affil" type="text" placeholder="Lab or institution (optional)"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <div class="flex gap-2">
              <input id="signup-city" type="text" placeholder="City (optional)"
                style="flex:3;" class="min-w-0 border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
              <input id="signup-country" type="text" placeholder="Country"
                style="flex:2;" class="min-w-0 border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            </div>
            <p id="signup-error" class="text-red-500 text-xs hidden"></p>
            <p id="signup-success" class="text-green-700 text-xs hidden"></p>
            <button type="submit"
              class="w-full text-white rounded-lg py-2.5 text-sm font-semibold transition mt-1" style="background:#0f4530;">
              Create account
            </button>
          </form>
        </div>

        <!-- Forgot password panel -->
        <div id="auth-panel-forgot" class="hidden">
          <p class="text-sm text-gray-600 mb-4">Enter your email and we'll send you a reset link.</p>
          <form id="auth-form-forgot" class="flex flex-col gap-3">
            <input id="forgot-email" type="email" placeholder="Email" required
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <p id="forgot-error" class="text-red-500 text-xs hidden"></p>
            <p id="forgot-success" class="text-green-700 text-xs hidden"></p>
            <button type="submit"
              class="w-full text-white rounded-lg py-2.5 text-sm font-semibold transition" style="background:#0f4530;">
              Send reset link
            </button>
          </form>
          <button id="auth-back-signin" class="mt-3 w-full text-center text-sm text-gray-400 hover:text-gray-600 transition-colors">Back to sign in</button>
        </div>

        <!-- Set new password panel (shown after user clicks email reset link) -->
        <div id="auth-panel-reset" class="hidden">
          <p class="text-sm text-gray-600 mb-4">Choose a new password for your account.</p>
          <form id="auth-form-reset" class="flex flex-col gap-3">
            <input id="reset-password" type="password" placeholder="New password (min 8 characters)" required minlength="8"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <input id="reset-password2" type="password" placeholder="Confirm new password" required
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
            <p id="reset-error" class="text-red-500 text-xs hidden"></p>
            <button type="submit"
              class="w-full text-white rounded-lg py-2.5 text-sm font-semibold transition" style="background:#0f4530;">
              Set new password
            </button>
          </form>
        </div>

        <button id="auth-modal-close" class="mt-4 w-full text-center text-sm text-gray-400 hover:text-gray-600 transition-colors">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ─── ADMIN MODAL ───────────────────────────────────────── -->
  <div id="admin-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 overflow-hidden flex flex-col" style="max-height:85vh;">
      <div class="px-6 py-4 flex items-center justify-between flex-shrink-0" style="background:#0f4530;">
        <h2 class="font-display font-bold text-white text-xl">User Management</h2>
        <button id="admin-modal-close" class="text-white/60 hover:text-white text-xl leading-none transition-colors">✕</button>
      </div>
      <div id="admin-panel-content" class="flex-1 overflow-y-auto p-6">
        <div class="text-center text-gray-300 py-8">Loading…</div>
      </div>
    </div>
  </div>

  <!-- ─── ACCOUNT MODAL ──────────────────────────────────────── -->
  <div id="account-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
      <!-- Header -->
      <div class="px-6 py-4 flex items-center justify-between" style="background:#0f4530;">
        <h2 class="font-display font-bold text-white text-xl">My Account</h2>
        <button id="account-modal-close" class="text-white/60 hover:text-white text-2xl leading-none transition-colors">✕</button>
      </div>
      <!-- Avatar + identity -->
      <div class="px-6 pt-5 pb-4 flex items-center gap-4">
        <div id="acct-avatar"
          style="width:52px;height:52px;border-radius:50%;background:#0f4530;display:flex;align-items:center;
                 justify-content:center;font-size:22px;font-weight:700;color:white;flex-shrink:0;letter-spacing:-1px;"></div>
        <div class="min-w-0">
          <div id="acct-name-display" style="font-size:16px;font-weight:600;color:#111;"></div>
          <div id="acct-email-display" style="font-size:11.5px;color:#9ca3af;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
          <div id="acct-role-display" style="margin-top:5px;"></div>
        </div>
      </div>
      <div style="height:1px;background:#f3f4f6;"></div>
      <!-- Edit fields -->
      <div class="px-6 py-4 flex flex-col gap-3">
        <div>
          <label class="block" style="font-size:10.5px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;">Display name</label>
          <input id="acct-display-name" type="text" placeholder="Your name"
            class="mt-1 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
        </div>
        <div>
          <label class="block" style="font-size:10.5px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;">Lab / Institution</label>
          <input id="acct-affiliation" type="text" placeholder="Your lab or institution"
            class="mt-1 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
        </div>
        <div class="flex gap-2">
          <div style="flex:3;">
            <label class="block" style="font-size:10.5px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;">City</label>
            <input id="acct-city" type="text" placeholder="City"
              class="mt-1 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
          </div>
          <div style="flex:2;">
            <label class="block" style="font-size:10.5px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;">Country</label>
            <input id="acct-country" type="text" placeholder="Country"
              class="mt-1 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand" />
          </div>
        </div>
        <p id="acct-save-error" class="text-red-500 text-xs hidden"></p>
        <p id="acct-save-success" class="text-green-700 text-xs hidden"></p>
        <button id="acct-save-btn"
          class="w-full text-white rounded-lg py-2.5 text-sm font-semibold transition" style="background:#0f4530;">
          Save changes
        </button>
      </div>
      <div style="height:1px;background:#f3f4f6;"></div>
      <!-- Stats -->
      <div class="px-6 py-4">
        <div style="font-size:10.5px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Account info</div>
        <div class="flex gap-8">
          <div>
            <div id="acct-member-since" style="font-size:14px;font-weight:600;color:#111;">—</div>
            <div style="font-size:10px;color:#9ca3af;margin-top:2px;">Member since</div>
          </div>
          <div>
            <div id="acct-annotation-count" style="font-size:14px;font-weight:600;color:#111;">—</div>
            <div style="font-size:10px;color:#9ca3af;margin-top:2px;">Annotations</div>
          </div>
        </div>
      </div>
      <div style="height:1px;background:#f3f4f6;"></div>
      <!-- Footer actions -->
      <div class="px-6 py-4">
        <button id="acct-change-password" class="text-sm font-medium transition-colors" style="color:#0f4530;">
          Change password →
        </button>
      </div>
    </div>
  </div>

  <!-- Supabase JS client (ESM via CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script type="module" src="/web/js/app.js?v=80"></script>
</body>
</html>
